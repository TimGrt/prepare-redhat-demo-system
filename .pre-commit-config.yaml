repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: 📝 Remove trailing whitespaces
        args: [--markdown-linebreak-ext=md]
      - id: requirements-txt-fixer
        name: 🐍 Sort entries in requirements.txt
      - id: check-merge-conflict
        name: ❌ Check for merge conflict markers
      - id: check-yaml
        name: 🐫 Check YAML syntax
        args: [--unsafe]
      - id: no-commit-to-branch
        name: 💻 Check for commits to allowed branch
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        name: 📋 Check Markdown syntax
  - repo: https://github.com/ansible-community/ansible-lint
    rev: v26.2.0
    hooks:
      - id: ansible-lint
        language_version: python3
        name: 🔎 Check for Ansible Best-Practices
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.0
    hooks:
      - id: check-github-workflows
        name: ➿ Check GitHub Workflows
      - id: check-github-issue-forms
        name: 📚 Check GitHub Issue Forms
      - id: check-renovate
        name: 🔤 Check Renovate configuration
